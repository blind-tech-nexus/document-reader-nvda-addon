name = pdfReaderForNvda
summary = "PDF Reader For NVDA"
description = """A powerful NVDA add-on for accessible PDF reading with advanced features.

Developed by Sujan Rai, this add-on allows you to read your PDF files directly within the NVDA screen reader.

Often, we need to read PDF files, but uploading them to external servers can compromise your privacy. This add-on ensures that your PDFs are processed entirely locally, keeping your documents safe.

Beyond simple PDF reading, this add-on provides a wealth of features for manipulation, accessibility, OCR, read-aloud capabilities, and much more.
This add-on is the next generation add-on for the previous and outdated pdf reader add-on.
For feedback and support, email: blindtechvisionary@gmail.com
Join our official Telegram channel for more resources: https://t.me/blindtechvisionary

Thank you for using this add-on!"""
author = "Sujan rai <blindtechvisionary@gmail.com>"
url = https://github.com/blind-tech-nexus/pdf-reader-for-nvda
version = 0.1.0
docFileName = readme.html
